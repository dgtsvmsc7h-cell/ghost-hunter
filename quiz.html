<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ghost Hunter — 關卡測驗</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080010;--card:rgba(18,4,35,0.92);--border:rgba(255,120,0,0.35);
  --orange:#ff7a00;--orange2:#ff9c2b;--purple:#8a2be2;
  --green:#22ff77;--red:#ff2255;--gold:#ffd700;--cream:#fff0d8;
  --text:#f0e0ff;--subtext:rgba(240,224,255,0.6);--radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  min-height:100vh;background:var(--bg);color:var(--text);
  font-family:'Nunito',sans-serif;overflow-x:hidden;
}
body{
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(138,43,226,0.2) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 80%, rgba(255,122,0,0.15) 0%,transparent 55%);
}
.page{max-width:480px;margin:0 auto;padding:16px 16px 60px;min-height:100vh}

/* Stage header */
.stage-header{
  display:flex;align-items:center;gap:12px;padding:16px 0;margin-bottom:16px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.back-btn{
  background:rgba(255,255,255,0.08);border:none;border-radius:10px;
  padding:8px 14px;color:var(--text);font-size:14px;font-weight:700;
  cursor:pointer;text-decoration:none;white-space:nowrap;
}
.stage-info{flex:1}
.stage-info .s-tag{
  font-size:10px;letter-spacing:3px;color:var(--subtext);text-transform:uppercase;
}
.stage-info .s-name{
  font-family:'Bangers',cursive;font-size:20px;letter-spacing:1px;color:var(--orange2);line-height:1.1;
}
.stage-icon{font-size:32px}

/* Progress bar */
.progress-wrap{margin-bottom:20px}
.progress-top{
  display:flex;justify-content:space-between;align-items:center;
  font-size:13px;color:var(--subtext);margin-bottom:6px;
}
.progress-bar{
  height:8px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,var(--orange),var(--orange2));
  border-radius:99px;transition:width 0.4s ease;
  box-shadow:0 0 8px rgba(255,122,0,0.5);
}

/* Question */
.q-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;margin-bottom:16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.q-num{font-size:11px;letter-spacing:3px;color:var(--subtext);margin-bottom:10px;text-transform:uppercase}
.q-text{font-size:17px;font-weight:700;line-height:1.55;color:var(--cream);margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:10px}
.option-btn{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);
  border-radius:11px;padding:14px 14px;cursor:pointer;transition:all 0.2s;
  text-align:left;width:100%;font-family:'Nunito',sans-serif;
}
.option-btn:active:not(:disabled){transform:scale(0.98)}
.option-btn .opt-letter{
  width:30px;height:30px;flex-shrink:0;border-radius:50%;
  background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;
  font-family:'Bangers',cursive;font-size:17px;color:var(--orange2);
}
.option-btn .opt-text{font-size:15px;color:var(--text);line-height:1.4;flex:1}
.option-btn.selected{border-color:var(--orange);background:rgba(255,122,0,0.12)}
.option-btn.correct{border-color:var(--green)!important;background:rgba(34,255,119,0.12)!important}
.option-btn.correct .opt-letter{background:rgba(34,255,119,0.2);color:var(--green)}
.option-btn.wrong{border-color:var(--red)!important;background:rgba(255,34,85,0.1)!important}
.option-btn.wrong .opt-letter{background:rgba(255,34,85,0.2);color:var(--red)}
.option-btn:disabled{cursor:default}

/* Feedback */
.feedback{
  padding:13px 16px;border-radius:10px;font-size:14px;font-weight:700;
  margin-top:14px;text-align:center;display:none;
}
.feedback.correct{display:block;background:rgba(34,255,119,0.12);border:1px solid rgba(34,255,119,0.4);color:var(--green)}
.feedback.wrong{display:block;background:rgba(255,34,85,0.1);border:1px solid rgba(255,34,85,0.35);color:var(--red)}

/* Next btn */
.next-btn{
  width:100%;background:linear-gradient(135deg,var(--orange),#ff3a00);
  border:none;border-radius:12px;padding:17px;
  font-family:'Bangers',cursive;font-size:22px;letter-spacing:2px;
  color:white;cursor:pointer;margin-top:14px;
  display:none;box-shadow:0 4px 20px rgba(255,80,0,0.3);
}
.next-btn.show{display:block}
.next-btn:active{transform:scale(0.97)}

/* Result screen */
.result-screen{
  display:none;text-align:center;padding:16px 0;
}
.result-screen.show{display:block}
.result-icon{font-size:80px;margin-bottom:16px;display:block}
.result-title{
  font-family:'Bangers',cursive;font-size:36px;letter-spacing:2px;margin-bottom:8px;
}
.result-title.pass{color:var(--green)}
.result-title.fail{color:var(--red)}
.result-score{font-size:16px;color:var(--subtext);margin-bottom:20px}
.result-msg{
  font-size:15px;color:var(--text);line-height:1.6;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:20px;
}
.result-btn{
  width:100%;border:none;border-radius:12px;padding:17px;
  font-family:'Bangers',cursive;font-size:22px;letter-spacing:2px;
  color:white;cursor:pointer;margin-bottom:10px;
}
.result-btn.main{background:linear-gradient(135deg,var(--orange),#ff3a00);box-shadow:0 4px 20px rgba(255,80,0,0.3)}
.result-btn.sec{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:var(--text)}
.result-btn:active{transform:scale(0.97)}

/* Already done */
.already-card{
  background:var(--card);border:1px solid rgba(34,255,119,0.4);border-radius:var(--radius);
  padding:28px 20px;text-align:center;
}
.already-card .ac-icon{font-size:64px;display:block;margin-bottom:14px}
.already-card h3{font-family:'Bangers',cursive;font-size:30px;color:var(--green);margin-bottom:8px;letter-spacing:1px}
.already-card p{font-size:15px;color:var(--subtext);margin-bottom:20px;line-height:1.5}
</style>
</head>
<body>
<div class="page">
  <div id="quizContent"></div>
</div>

<script>
const DB_KEY='ghost_hunter_db_v1';
const SESSION_KEY='ghost_hunter_session';

// ── DB ──
function getDB(){
  try{return JSON.parse(localStorage.getItem(DB_KEY)||'{"users":{},"voteStats":{"zone1":0,"zone2":0,"zone3":0,"zone4":0}}')}
  catch{return{users:{},voteStats:{zone1:0,zone2:0,zone3:0,zone4:0}}}
}
function saveDB(db){localStorage.setItem(DB_KEY,JSON.stringify(db))}
function getCurrentUser(){
  const sid=localStorage.getItem(SESSION_KEY)||''; if(!sid) return null;
  return getDB().users[sid]||null;
}
function saveUser(user){const db=getDB();db.users[user.sid]=user;saveDB(db)}

const urlParams=new URLSearchParams(window.location.search);
const level=parseInt(urlParams.get('level'))||1;

// ── Quiz data ──
const QUIZZES={
  1:{
    title:'萬聖節的起源',icon:'🪦',
    loc:'第一醫學大樓',color:'#00bcd4',
    questions:[
      {q:'萬聖節最早起源於哪個民族的古老節日？',opts:['古希臘人','塞爾特人（Celts）的薩溫節','羅馬人的豐收祭','北歐維京人的冬至祭'],ans:1},
      {q:'「薩溫節（Samhain）」標誌著哪個季節的開始？',opts:['春天','夏天','秋天','冬天'],ans:3},
      {q:'Halloween 這個英文字來自哪個詞的縮寫？',opts:['All Hallows Eve','Holy Winter Eve','Haunted All Night','Harvest All Week'],ans:0},
      {q:'古凱爾特人認為，薩溫節這天的鬼魂比平時更容易：',opts:['被消滅','進入人間','回到天堂','變成植物'],ans:1},
      {q:'萬聖節固定在每年的哪一天？',opts:['10 月 30 日','10 月 31 日','11 月 1 日','11 月 2 日'],ans:1},
    ]
  },
  2:{
    title:'世界各國鬼怪文化',icon:'👻',
    loc:'管理大樓',color:'#ff0066',
    questions:[
      {q:'日本傳說中，被遺棄的舊雨傘變成的妖怪叫什麼？',opts:['河童','唐傘小僧','座敷童子','雪女'],ans:1},
      {q:'墨西哥「亡靈節」中，最具代表性的裝飾圖騰是？',opts:['黑貓','蜘蛛','五顏六色的糖骷髏','骷髏蠟燭'],ans:2},
      {q:'中國民間俗稱農曆幾月為「鬼月」，鬼門大開？',opts:['五月','六月','七月','八月'],ans:2},
      {q:'泰國家喻戶曉的女鬼故事「娜娜」，她為何不願離開？',opts:['她尋找失去的寶物','她因難產而死，卻深愛丈夫不願離去','她被詛咒困在原地','她等待後代祭拜'],ans:1},
      {q:'愛爾蘭傳說中的「報喪女妖 Banshee」，以何種方式預告死亡？',opts:['現身在窗前','發出淒厲的哭嚎聲','把門敲三下','熄滅屋內燭火'],ans:1},
    ]
  },
  3:{
    title:'南瓜燈的秘密',icon:'🎃',
    loc:'圖書館',color:'#ff6600',
    questions:[
      {q:'南瓜燈「傑克燈（Jack-o\'-Lantern）」最初是用什麼蔬菜雕刻的？',opts:['南瓜','蘿蔔','蕪菁（Turnip）','地瓜'],ans:2},
      {q:'傳說中傑克（Stingy Jack）被天堂和地獄都拒絕後，手持什麼在人間遊蕩？',opts:['蠟燭','火把','惡魔賜的炭火燈籠','骷髏頭'],ans:2},
      {q:'愛爾蘭移民到美國後，為何改用南瓜代替蕪菁？',opts:['蕪菁太貴','南瓜更大、更好雕刻，且在北美盛產','南瓜更美觀','南瓜代表幸運'],ans:1},
      {q:'南瓜燈通常雕刻成可怕的表情，最原始的目的是？',opts:['增加節日樂趣','嚇走試圖進屋的惡靈','吸引善靈護衛家宅','作為照明用途'],ans:1},
      {q:'Jack-o\'-Lantern 中的「Jack」在傳說中最初是什麼身份？',opts:['一名惡魔','一名吝嗇的農夫','一名巫師','一名海盜'],ans:1},
    ]
  }
};

const EQUIPMENT_POOL=['sword','shield','grail','armor'];
const EQUIP_INFO={
  sword:{icon:'⚔️',name:'聖劍'},
  shield:{icon:'🛡️',name:'聖盾'},
  grail:{icon:'🏆',name:'聖杯'},
  armor:{icon:'🛡️',name:'盔甲'}
};

let currentQ=0, userAnswers=[], quizData=null, userData=null;

function init(){
  const user=getCurrentUser();
  const qd=QUIZZES[level];
  if(!qd){render404(); return}
  if(!user){renderLoginPrompt(qd); return}
  if(user.progress['level'+level].completed){renderAlreadyDone(qd,user); return}
  quizData=qd; userData=user;
  currentQ=0; userAnswers=[];
  renderQuiz();
}

function render404(){
  document.getElementById('quizContent').innerHTML=`<div style="text-align:center;padding:60px 20px">
    <div style="font-size:60px;margin-bottom:16px">💀</div>
    <h3 style="font-family:'Bangers',cursive;font-size:28px;color:#ff2255;margin-bottom:12px">關卡不存在</h3>
    <a href="index.html" style="color:#ff9c2b;font-size:15px">← 返回首頁</a>
  </div>`;
}

function renderLoginPrompt(qd){
  document.getElementById('quizContent').innerHTML=`
    <div class="stage-header">
      <a href="index.html" class="back-btn">← 返回</a>
      <div class="stage-info"><div class="s-tag">STAGE 0${level}</div><div class="s-name">${qd.title}</div></div>
      <span class="stage-icon">${qd.icon}</span>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 20px;text-align:center">
      <div style="font-size:54px;margin-bottom:14px">🔐</div>
      <h3 style="font-family:'Bangers',cursive;font-size:26px;color:var(--orange2);margin-bottom:8px">請先登入</h3>
      <p style="font-size:14px;color:var(--subtext);margin-bottom:20px;line-height:1.6">輸入學號與姓名後即可開始挑戰<br>（若已建立帳號，自動接續進度）</p>
      <div style="margin-bottom:12px">
        <input type="text" id="pSid" placeholder="學號" style="width:100%;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.12);border-radius:10px;padding:13px 14px;font-size:17px;color:var(--cream);font-family:'Nunito',sans-serif;outline:none;box-sizing:border-box;margin-bottom:10px;-webkit-appearance:none">
        <input type="text" id="pName" placeholder="姓名" style="width:100%;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.12);border-radius:10px;padding:13px 14px;font-size:17px;color:var(--cream);font-family:'Nunito',sans-serif;outline:none;box-sizing:border-box;-webkit-appearance:none">
      </div>
      <button onclick="quickLogin()" style="width:100%;background:linear-gradient(135deg,var(--orange),#ff3a00);border:none;border-radius:12px;padding:16px;font-family:'Bangers',cursive;font-size:21px;letter-spacing:2px;color:white;cursor:pointer">🎮 開始挑戰</button>
    </div>`;
}

function quickLogin(){
  const sid=document.getElementById('pSid').value.trim();
  const name=document.getElementById('pName').value.trim();
  if(!sid||!name){alert('請填入學號與姓名');return}
  const db=getDB();
  if(!db.users[sid]){
    db.users[sid]={
      sid,name,createdAt:new Date().toISOString(),
      progress:{
        level1:{completed:false,score:0,completedAt:null,equipment:null},
        level2:{completed:false,score:0,completedAt:null,equipment:null},
        level3:{completed:false,score:0,completedAt:null,equipment:null},
        level4:{completed:false,vote:null,completedAt:null,equipment:null},
      },
      equipmentOrder:[],bossDefeated:false,bossDefeatedAt:null
    };
    saveDB(db);
  }
  localStorage.setItem(SESSION_KEY,sid);
  init();
}

function renderAlreadyDone(qd,user){
  const p=user.progress['level'+level];
  const eq=EQUIP_INFO[p.equipment]||{icon:'?',name:'?'};
  document.getElementById('quizContent').innerHTML=`
    <div class="stage-header">
      <a href="index.html" class="back-btn">← 返回</a>
      <div class="stage-info"><div class="s-tag">STAGE 0${level}</div><div class="s-name">${qd.title}</div></div>
      <span class="stage-icon">${qd.icon}</span>
    </div>
    <div class="already-card">
      <span class="ac-icon">✅</span>
      <h3>已完成此關！</h3>
      <p>分數：${p.score} / ${qd.questions.length}<br>已獲得裝備：${eq.icon} ${eq.name}</p>
      <a href="warrior.html"><button class="result-btn main" style="margin-bottom:10px">⚔️ 查看勇者地圖</button></a>
      <a href="index.html"><button class="result-btn sec">🏠 回首頁</button></a>
    </div>`;
}

function renderQuiz(){
  const q=quizData.questions[currentQ];
  const total=quizData.questions.length;
  const pct=((currentQ)/total*100).toFixed(0);
  document.getElementById('quizContent').innerHTML=`
    <div class="stage-header">
      <a href="index.html" class="back-btn">← 返回</a>
      <div class="stage-info"><div class="s-tag">STAGE 0${level}</div><div class="s-name">${quizData.title}</div></div>
      <span class="stage-icon">${quizData.icon}</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-top">
        <span>第 ${currentQ+1} 題 / ${total} 題</span>
        <span>${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-card">
      <div class="q-num">QUESTION ${String(currentQ+1).padStart(2,'0')}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((o,i)=>`
          <button class="option-btn" onclick="selectOpt(${i})" data-idx="${i}">
            <span class="opt-letter">${String.fromCharCode(65+i)}</span>
            <span class="opt-text">${o}</span>
          </button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQ()">${currentQ===total-1?'查看結果 🏆':'下一題 →'}</button>
    </div>`;
}

function selectOpt(idx){
  const q=quizData.questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  btns.forEach(b=>{b.disabled=true});
  const fb=document.getElementById('feedback');
  if(idx===q.ans){
    btns[idx].classList.add('correct');
    fb.className='feedback correct'; fb.textContent='✓ 正確！';
    userAnswers.push(true);
  } else {
    btns[idx].classList.add('wrong');
    btns[q.ans].classList.add('correct');
    fb.className='feedback wrong'; fb.textContent=`✗ 答錯了！正確答案是 ${String.fromCharCode(65+q.ans)}`;
    userAnswers.push(false);
  }
  document.getElementById('nextBtn').classList.add('show');
}

function nextQ(){
  currentQ++;
  if(currentQ>=quizData.questions.length) finishQuiz();
  else renderQuiz();
}

function finishQuiz(){
  const correct=userAnswers.filter(a=>a).length;
  const total=quizData.questions.length;
  const pass=correct>=3;
  if(pass){
    const owned=userData.equipmentOrder||[];
    const available=['sword','shield','grail','armor'].filter(e=>!owned.includes(e));
    const newEq=available[Math.floor(Math.random()*available.length)];
    const now=new Date().toISOString();
    userData.progress['level'+level]={completed:true,score:correct,completedAt:now,equipment:newEq};
    userData.equipmentOrder=[...owned,newEq];
    saveUser(userData);
    window.location.href=`warrior.html?reward=${newEq}&level=${level}&score=${correct}_${total}`;
  } else {
    showFailScreen(correct,total);
  }
}

function showFailScreen(c,t){
  document.getElementById('quizContent').innerHTML=`
    <div class="result-screen show">
      <span class="result-icon">💀</span>
      <div class="result-title fail">挑戰失敗</div>
      <div class="result-score">分數：${c} / ${t}（需答對 3 題以上）</div>
      <div class="result-msg">不要氣餒，勇者！重新挑戰，展示你的實力！</div>
      <button class="result-btn main" onclick="location.reload()">🔄 重新挑戰</button>
      <a href="index.html"><button class="result-btn sec">🏠 回首頁</button></a>
    </div>`;
}

init();
</script>
</body>
</html>
