<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ghost Hunter — 勇者地圖</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Share+Tech+Mono&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#030106;--card:rgba(10,2,20,0.9);--border:rgba(0,210,255,0.3);
  --orange:#ff7a00;--orange2:#ff9c2b;--purple:#8a2be2;--purple2:#b84eff;
  --green:#22ff77;--red:#ff2255;--gold:#ffd700;--cream:#fff0d8;
  --text:#f0e0ff;--subtext:rgba(240,224,255,0.55);--radius:12px;
  --cyan:#00d2ff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background-color:#030106;
  background-image:
    linear-gradient(rgba(0,102,255,0.22) 1.5px,transparent 1.5px),
    linear-gradient(90deg,rgba(0,102,255,0.22) 1.5px,transparent 1.5px),
    radial-gradient(rgba(157,0,255,0.35) 2px,transparent 0);
  background-size:50px 50px,50px 50px,25px 25px;
}

.page{max-width:520px;margin:0 auto;padding:14px 14px 60px;position:relative;z-index:1}

/* Header */
.map-header{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
  padding:12px 0;border-bottom:1px solid rgba(0,210,255,0.2);
}
.back-link{
  background:rgba(0,210,255,0.1);border:1px solid rgba(0,210,255,0.3);
  border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;
  color:var(--cyan);text-decoration:none;flex-shrink:0;
}
.map-header h1{
  font-family:'Bangers',cursive;font-size:20px;letter-spacing:2px;
  color:var(--gold);flex:1;text-align:center;
}
.map-header .user-tag{
  font-size:12px;color:var(--subtext);font-family:'Share Tech Mono',monospace;flex-shrink:0;
  text-align:right;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* Map container - horizontally scrollable on mobile */
.map-wrapper{
  width:100%;overflow:auto;-webkit-overflow-scrolling:touch;
  height:280px;
  border:1px solid rgba(0,210,255,0.2);border-radius:10px;
  margin-bottom:14px;position:relative;
  border-color:rgba(0,210,255,0.3);
  box-shadow:0 4px 24px rgba(0,0,0,0.6),0 0 30px rgba(0,210,255,0.2),0 0 60px rgba(0,210,255,0.08);
  background:rgba(3,1,6,0.95);
  scroll-behavior:smooth;
}
.campus-svg{
  display:block;
  /* On mobile: fixed width for readability, allows horizontal scroll */
  width:700px;
  height:auto;
}
@media(min-width:720px){
  .campus-svg{width:100%}
}

/* Story box */
.story-box{
  background:rgba(5,2,15,0.9);border:1px dashed rgba(34,255,119,0.4);
  border-radius:10px;padding:14px 16px;margin-bottom:14px;
  font-family:'Share Tech Mono',monospace;font-size:15px;color:var(--green);
  line-height:1.5;text-align:center;min-height:60px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.4s;
}
.story-box.gold{border-color:rgba(255,215,0,0.5);color:var(--gold);background:rgba(20,10,0,0.9)}

/* Equipment bar */
.equip-bar{
  display:flex;gap:8px;margin-bottom:14px;
}
.eq-slot{
  flex:1;background:rgba(255,255,255,0.03);border:1.5px dashed rgba(255,255,255,0.12);
  border-radius:8px;padding:8px 6px;text-align:center;transition:all 0.35s;
}
.eq-slot.owned{
  border-style:solid;border-color:var(--gold);background:rgba(255,215,0,0.07);
  box-shadow:0 0 14px rgba(255,215,0,0.2);
}
.eq-slot .eq-icon{font-size:20px;display:block;margin-bottom:2px;filter:brightness(0);opacity:0.4;transition:filter 0.3s,opacity 0.3s}
.eq-slot.owned .eq-icon{filter:none;opacity:1}
.eq-slot .eq-name{font-size:10px;color:rgba(255,255,255,0.25);font-weight:700}
.eq-slot.owned .eq-name{color:var(--gold)}

/* Actions */
.actions{display:flex;gap:10px}
.action-btn{
  flex:1;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);
  border-radius:10px;padding:14px;font-family:'Nunito',sans-serif;font-size:14px;
  font-weight:700;color:var(--text);cursor:pointer;text-align:center;
  text-decoration:none;display:block;transition:all 0.2s;
}
.action-btn:active{background:rgba(255,255,255,0.1)}
.action-btn.primary{
  background:linear-gradient(135deg,var(--orange),#ff3a00);
  border-color:transparent;color:white;
  box-shadow:0 4px 16px rgba(255,80,0,0.3);
}

/* Reward overlay */
.reward-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);
  z-index:500;align-items:center;justify-content:center;
  padding:20px;backdrop-filter:blur(6px);
}
.reward-overlay.open{display:flex;animation:fadeIn 0.35s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.reward-box{
  background:linear-gradient(180deg,#120028 0%,#050010 100%);
  border:3px solid var(--gold);border-radius:18px;
  padding:36px 28px;text-align:center;max-width:380px;width:100%;
  box-shadow:0 0 60px rgba(255,215,0,0.5);
  animation:rewardPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes rewardPop{from{transform:scale(0.4);opacity:0}to{transform:scale(1);opacity:1}}
.reward-box .rb-badge{
  font-size:12px;letter-spacing:4px;color:var(--gold);font-family:'Share Tech Mono',monospace;
  margin-bottom:12px;
}
.reward-box .rb-title{
  font-family:'Bangers',cursive;font-size:32px;letter-spacing:2px;color:var(--gold);
  margin-bottom:18px;text-shadow:0 0 20px rgba(255,215,0,0.6);
}
.reward-box .rb-chest-img{
  width:120px;height:120px;object-fit:contain;
  display:block;margin:0 auto 14px;
  filter:drop-shadow(0 0 18px rgba(255,215,0,0.8)) drop-shadow(0 0 36px rgba(255,165,0,0.5));
  animation:iconFloat 2s ease-in-out infinite;
}
@keyframes iconFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-10px) rotate(3deg)}}
.reward-box .rb-name{
  font-family:'Bangers',cursive;font-size:28px;color:var(--cream);
  letter-spacing:2px;margin-bottom:8px;
}
.reward-box .rb-desc{font-size:14px;color:var(--subtext);margin-bottom:24px;line-height:1.5}
.reward-box .rb-btn{
  width:100%;background:linear-gradient(135deg,var(--gold),#ff8c00);
  border:none;border-radius:10px;padding:16px;
  font-family:'Bangers',cursive;font-size:22px;letter-spacing:2px;
  color:#1a0000;cursor:pointer;
}
.reward-box .rb-btn:active{transform:scale(0.97)}

/* Boss fight overlay */
.boss-overlay{
  display:none;position:fixed;inset:0;
  background:radial-gradient(ellipse at center,rgba(40,0,0,0.98),rgba(5,0,10,0.99));
  z-index:600;align-items:center;justify-content:center;
  padding:20px;flex-direction:column;
  backdrop-filter:blur(6px);
}
.boss-overlay.open{display:flex;animation:fadeIn 0.5s}
.boss-scene{text-align:center;max-width:380px;width:100%}
.boss-scene .bs-title{
  font-family:'Bangers',cursive;font-size:38px;letter-spacing:4px;color:var(--red);
  text-shadow:0 0 20px rgba(255,34,85,0.7);margin-bottom:20px;
  animation:bossFlash 0.5s infinite alternate;
}
@keyframes bossFlash{from{opacity:0.8}to{opacity:1;text-shadow:0 0 40px rgba(255,34,85,0.9)}}
.battle-arena{
  display:flex;align-items:center;justify-content:space-around;
  padding:24px 0;margin-bottom:20px;position:relative;
}
.battle-arena::before{
  content:'⚡';position:absolute;left:50%;transform:translateX(-50%);
  font-size:40px;animation:battleSpark 0.4s infinite alternate;
}
@keyframes battleSpark{from{transform:translateX(-50%) scale(0.8);opacity:0.5}to{transform:translateX(-50%) scale(1.2);opacity:1}}
.warrior-battle{font-size:80px;animation:attackRight 0.8s ease-in-out infinite alternate}
@keyframes attackRight{from{transform:translateX(0) scaleX(1)}to{transform:translateX(15px) scaleX(1)}}
.boss-battle{font-size:80px;animation:attackLeft 0.8s ease-in-out infinite alternate}
@keyframes attackLeft{from{transform:translateX(0)}to{transform:translateX(-15px)}}

/* Victory final */
.victory-overlay{
  display:none;position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 30% 30%,rgba(138,43,226,0.6),transparent 55%),
    radial-gradient(ellipse at 70% 70%,rgba(255,80,0,0.5),transparent 60%),
    rgba(5,0,12,0.97);
  z-index:700;align-items:center;justify-content:center;
  padding:20px;flex-direction:column;
  backdrop-filter:blur(8px);
}
.victory-overlay.open{display:flex;animation:fadeIn 0.6s}
.victory-box{
  background:linear-gradient(180deg,#1a0a00 0%,#080015 100%);
  border:3px solid var(--gold);border-radius:20px;
  padding:40px 28px;text-align:center;max-width:400px;width:100%;
  box-shadow:0 0 80px rgba(255,215,0,0.6);
  animation:rewardPop 0.7s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;
}
.victory-box::before{content:'✦ VICTORY ✦';position:absolute;top:-15px;left:50%;transform:translateX(-50%);
  background:#080015;padding:0 16px;font-family:'Share Tech Mono',monospace;
  font-size:14px;color:var(--gold);letter-spacing:4px}
.victory-box .vb-icon{font-size:74px;display:block;margin-bottom:14px;animation:iconFloat 2s infinite ease-in-out}
.victory-box .vb-title{font-family:'Bangers',cursive;font-size:44px;letter-spacing:3px;color:var(--gold);
  text-shadow:0 0 30px rgba(255,215,0,0.6);margin-bottom:14px}
.victory-box .vb-msg{font-size:15px;color:var(--text);line-height:1.7;margin-bottom:12px}
.victory-box .vb-loc{font-family:'Bangers',cursive;font-size:26px;color:var(--orange2);
  letter-spacing:2px;margin:14px 0;line-height:1.3;text-shadow:0 0 15px rgba(255,120,0,0.5)}
.victory-box .vb-hint{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--subtext);margin-top:10px}
.victory-box .vb-btn{
  width:100%;background:linear-gradient(135deg,var(--gold),#ff8c00);
  border:none;border-radius:10px;padding:16px;
  font-family:'Bangers',cursive;font-size:22px;letter-spacing:2px;
  color:#1a0000;cursor:pointer;margin-top:18px;
}

/* Confetti */
.cpiece{position:fixed;top:-10px;width:8px;height:14px;z-index:999;pointer-events:none;animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* Building info overlay */
@keyframes slideup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.info-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);
  z-index:400;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);
}
.info-overlay.open{display:flex;animation:slideup 0.3s ease}
.info-box{
  background:#110020;border:1px solid rgba(255,100,0,0.4);border-radius:20px 20px 0 0;
  padding:28px 20px 40px;width:100%;max-width:480px;
}
.info-box .ib-icon{font-size:54px;text-align:center;display:block;margin-bottom:12px}
.info-box h3{font-family:'Bangers',cursive;font-size:28px;letter-spacing:1px;color:var(--orange2);margin-bottom:8px;text-align:center}
.info-box .ib-tag{text-align:center;margin-bottom:14px}
.info-box .ib-tag span{
  display:inline-block;background:rgba(255,122,0,0.15);border:1px solid var(--orange);
  border-radius:99px;padding:3px 12px;font-size:12px;color:var(--orange);letter-spacing:1px;
}
.info-box p{font-size:15px;color:var(--text);line-height:1.7;margin-bottom:14px}
.info-close{
  width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;padding:14px;font-size:15px;font-weight:700;
  color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;
}
</style>
</head>
<body>

<!-- Reward overlay -->
<div class="reward-overlay" id="rewardOverlay">
  <div class="reward-box">
    <div class="rb-badge">// 寶箱開啟 //</div>
    <div class="rb-title">獲得裝備！</div>
    <img class="rb-chest-img" src="已開啟寶箱.png" alt="寶箱"/>
    <div class="rb-name" id="rbName">聖劍</div>
    <div class="rb-desc" id="rbDesc">傳說武器</div>
    <button class="rb-btn" onclick="closeReward()">⚡ 收下裝備！</button>
  </div>
</div>

<!-- Boss fight overlay -->
<div class="boss-overlay" id="bossOverlay">
  <div class="boss-scene">
    <div class="bs-title">💀 BOSS FIGHT 💀</div>
    <div class="battle-arena">
      <div class="warrior-battle" id="warriorSprite">🧙</div>
      <div class="boss-battle" id="bossSprite">😈</div>
    </div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--red);letter-spacing:2px;animation:bossFlash 0.5s infinite alternate;text-align:center" id="battleMsg">激烈戰鬥中…</div>
  </div>
</div>

<!-- Building info overlay -->
<div class="info-overlay" id="infoOverlay" onclick="closeBuildingInfo()">
  <div class="info-box" onclick="event.stopPropagation()">
    <span class="ib-icon" id="infoIcon"><img src="關卡一元素.png" style="width:28px;height:28px;object-fit:contain"></span>
    <h3 id="infoTitle">STAGE 01</h3>
    <div class="ib-tag"><span id="infoLoc">地點</span></div>
    <p id="infoDesc">關卡說明</p>
    <button class="info-close" onclick="closeBuildingInfo()">關閉</button>
  </div>
</div>

<!-- Victory overlay -->
<div class="victory-overlay" id="victoryOverlay">
  <div class="victory-box">
    <span class="vb-icon">🏆</span>
    <div class="vb-title">VICTORY!</div>
    <div class="vb-msg">魔王已被擊敗！<br>校園平安了，勇者萬歲！</div>
    <div class="vb-msg">請前往領取獎品：</div>
    <div class="vb-loc">📍 管院 8 樓<br>人文科學觀摩室</div>
    <div class="vb-hint">// 憑此畫面或學號領取 //</div>
    <button class="vb-btn" onclick="closeVictory()">🎊 太棒了！</button>
  </div>
</div>

<div class="page">
  <div class="map-header">
    <a href="index.html" class="back-link">← 首頁</a>
    <h1>校園冒險地圖</h1>
    <div class="user-tag" id="userTag">--</div>
  </div>

  <!-- Campus map (scrollable on mobile) -->
  <div class="map-wrapper">
    <svg class="campus-svg" id="campusSvg" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
      <!-- Built by JS -->
    </svg>
  </div>

  <div class="story-box" id="storyBox">載入勇者資料中…</div>

  <!-- Equipment bar -->
  <div class="equip-bar" id="equipBar"></div>

  <!-- Actions -->
  <div class="actions">
    <a href="index.html" class="action-btn">🏠 首頁</a>
    <button class="action-btn" onclick="goNextQr()">📷 繼續闖關</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const DB_KEY='ghost_hunter_db_v1';
const SESSION_KEY='ghost_hunter_session';

// ── Firebase 設定（請替換為你的專案資訊）──
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDAMI3neAeRNrfVdG1NenlI6osL1qN6vyM",
  authDomain: "ghost-hunter-c8ec6.firebaseapp.com",
  projectId: "ghost-hunter-c8ec6",
  storageBucket: "ghost-hunter-c8ec6.firebasestorage.app",
  messagingSenderId: "822859188160",
  appId: "1:822859188160:web:80eff0b443c7939224aa25"
};
let fbStore = null;
(function initFirebase(){
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    fbStore = firebase.firestore();
  }catch(e){ console.warn('Firebase 未初始化，使用本機儲存', e); }
})();
async function syncUserToCloud(user){
  if(!fbStore) return;
  try{ await fbStore.collection('users').doc(user.sid).set(user); }
  catch(e){ console.warn('雲端寫入失敗', e); }
}
async function loadUserFromCloud(sid){
  if(!fbStore) return null;
  try{
    const snap=await fbStore.collection('users').doc(sid).get();
    if(snap.exists) return snap.data();
  }catch(e){ console.warn('雲端讀取失敗',e); }
  return null;
}

function getDB(){
  try{return JSON.parse(localStorage.getItem(DB_KEY)||'{"users":{},"voteStats":{"zone1":0,"zone2":0,"zone3":0,"zone4":0}}')}
  catch{return{users:{},voteStats:{zone1:0,zone2:0,zone3:0,zone4:0}}}
}
function saveDB(db){localStorage.setItem(DB_KEY,JSON.stringify(db))}
function getCurrentUser(){
  const sid=localStorage.getItem(SESSION_KEY)||''; if(!sid)return null;
  return getDB().users[sid]||null;
}
function saveUser(user){const db=getDB();db.users[user.sid]=user;saveDB(db);syncUserToCloud(user);}

// ─── Stage info ───
const STAGE_INFO=[
  {num:1,icon:'<img src="關卡一元素.png" style="width:28px;height:28px;object-fit:contain">',title:'萬聖節的起源',loc:'第一醫學大樓',desc:'5 道萬聖節起源選擇題，需 5 題全對才算通關。通過後獲得隨機裝備！'},
  {num:2,icon:'<img src="關卡二元素.png" style="width:28px;height:28px;object-fit:contain">',title:'世界各國鬼怪文化',loc:'管理大樓（本活動起點）',desc:'5 道世界鬼怪文化選擇題，需 5 題全對才算通關。通過後獲得隨機裝備！'},
  {num:3,icon:'<img src="關卡三元素.png" style="width:28px;height:28px;object-fit:contain">',title:'南瓜燈的秘密',loc:'圖書館',desc:'5 道關於傑克燈與南瓜的選擇題，需 5 題全對才算通關。通過後獲得隨機裝備！'},
  {num:4,icon:'<img src="關卡四元素.png" style="width:28px;height:28px;object-fit:contain">',title:'打卡牆與投票',loc:'活動中心三樓',desc:'投票選出你最喜歡的展區！每位勇者只能投票一次，完成後獲得第四件裝備「盔甲」！'},
];
function showBuildingInfo(num){
  const s=STAGE_INFO[num-1]; if(!s) return;
  document.getElementById('infoIcon').innerHTML=s.icon;
  document.getElementById('infoTitle').textContent=`STAGE 0${s.num}｜${s.title}`;
  document.getElementById('infoLoc').textContent='📍 '+s.loc;
  document.getElementById('infoDesc').textContent=s.desc;
  document.getElementById('infoOverlay').classList.add('open');
}
function closeBuildingInfo(){
  document.getElementById('infoOverlay').classList.remove('open');
}

// ─── Equipment info ───
const EQ_INFO={
  sword:{icon:'<img src="劍元素.png" style="width:48px;height:48px;object-fit:contain">',name:'聖劍',desc:'斬斷邪靈的傳說武器'},
  shield:{icon:'<img src="聖盾元素.png" style="width:48px;height:48px;object-fit:contain">',name:'聖盾',desc:'抵擋黑暗咒術的光盾'},
  grail:{icon:'<img src="聖杯元素.png" style="width:48px;height:48px;object-fit:contain">',name:'聖杯',desc:'蘊含淨化之力的神器'},
  armor:{icon:'<img src="盔甲元素.png" style="width:48px;height:48px;object-fit:contain">',name:'盔甲',desc:'全身防禦的英雄鎧甲'}
};

// ─── Map building definitions ───
// viewBox: 0 0 1000 440
// Buildings from original SVG (preserved exactly):
//   管理大樓: rect x=300 y=20 w=290 h=145 → Level 2, START
//   第一醫學大樓: polygon 490,200 710,200 710,310 620,310 620,345 490,345 → Level 1
//   圖書館: rect x=680 y=40 w=120 h=100 → Level 3
//   活動中心 (was 工學): rect x=850 y=60 w=135 h=200 → Level 4, BOSS
//   第二醫學大樓: polygon 20,160 190,160 190,250 240,250 240,345 20,345 → decoration

// Warrior standing positions INSIDE buildings (avoiding text labels):
// Scale 0.45 → warrior ≈24px tall, head at center-12, feet at center+12
const WARRIOR_POS={
  start:  {x:555,y:150},  // 管理大樓 bottom-right of building, past badge
  boss:   {x:960,y:100},  // 活動中心 right half, beside BOSS marker at (860,95)
  level1: {x:680,y:215},  // 第一醫學 right section, between top and title y=241

// ─── Path routing ───
// Returns array of {x,y} waypoints (not including from/to positions)
function getWaypoints(fromId, toId){
  const pts=WARRIOR_POS;
  // Define routes as tuples of waypoint arrays
  const routes={
    // mgmt/start→others
    'start-level1':[[555,182],[660,182]],
    'start-level3':[[640,150],[755,148]],
    'start-level4':[[640,145],[810,145]],
    'start-boss':[[640,145],[810,145],[850,100]],  // 管理大樓 → 走廊 → 活動中心左壁直行
    // level2 === same position as start
    'level2-level1':[[555,182],[660,182]],
    'level2-level3':[[640,150],[755,148]],
    'level2-level4':[[640,145],[810,145]],
    'level2-boss':[[640,145],[810,145],[850,100]],  // 管理大樓 → 走廊 → 活動中心左壁直行
    // level1↔others
    'level1-level3':[[660,182],[755,182],[755,148]],
    'level1-level4':[[660,182],[810,150]],
    'level1-boss':[[660,182],[810,145],[850,100]],  // 第一醫學 → 走廊 → 活動中心左壁直行
    // level3↔others
    'level3-level4':[[808,55]],
    'level3-boss':[[808,55],[850,100]],  // 圖書館 → 建築間隙 → 活動中心左壁直行
    // level4↔boss (同建築內，先下行增加移動感再到 boss)
    'level4-boss':[[917,220]],
  };
  const key=`${fromId}-${toId}`;
  const rkey=`${toId}-${fromId}`;
  if(routes[key]) return routes[key];
  // Try reverse
  if(routes[rkey]) return [...routes[rkey]].reverse();
  return [];
}

function levelToLocId(level){
  if(level===2) return 'start'; // level2 is at mgmt (start)
  return 'level'+level;
}

// ─── Path calculation for visited journey ───
function getVisitedPath(user){
  const order=getCompletionOrder(user.progress);
  if(order.length===0) return [WARRIOR_POS.start];
  const pts=[WARRIOR_POS.start];
  order.forEach(lv=>{
    const locId=levelToLocId(lv);
    const fromId=getPrevLocId(order,lv);
    const wpts=getWaypoints(fromId,locId);
    wpts.forEach(wp=>pts.push(wp));
    pts.push(WARRIOR_POS[locId]);
  });
  if(user.bossDefeated){
    const lastLocId=levelToLocId(order[order.length-1]);
    const wpts=getWaypoints(lastLocId,'boss');
    wpts.forEach(wp=>pts.push(wp));
    pts.push(WARRIOR_POS.boss);
  }
  // Dedupe consecutive identical points
  return pts.filter((p,i)=>i===0||Math.hypot(p.x-pts[i-1].x,p.y-pts[i-1].y)>3);
}

function getPrevLocId(order,level){
  const idx=order.indexOf(level);
  if(idx===0) return 'start';
  return levelToLocId(order[idx-1]);
}

function getCompletionOrder(progress){
  const items=[];
  [1,2,3,4].forEach(lv=>{
    const p=progress['level'+lv];
    if(p.completed&&p.completedAt) items.push({lv,at:p.completedAt});
  });
  items.sort((a,b)=>new Date(a.at)-new Date(b.at));
  return items.map(i=>i.lv);
}

// ─── Current warrior position based on progress ───
function getCurrentWarriorPos(user){
  const order=getCompletionOrder(user.progress);
  if(user.bossDefeated) return WARRIOR_POS.boss;
  if(order.length===0) return WARRIOR_POS.start;
  const lastLv=order[order.length-1];
  return WARRIOR_POS[levelToLocId(lastLv)];
}

// ─── Animation flow ───
let animationRunning=false;
function delay(ms){return new Promise(r=>setTimeout(r,ms))}
function setStory(msg,gold=false){
  const el=document.getElementById('storyBox');
  el.textContent=msg;
  el.className='story-box'+(gold?' gold':'');
}

function updateWalkPolyline(pts){
  const svg=document.getElementById('campusSvg');
  const el=svg&&svg.querySelector('#walkPolyline');
  if(!el) return;
  el.setAttribute('points',pts&&pts.length>=2?pts.map(p=>`${p.x},${p.y}`).join(' '):'');
}

function scrollMapToWarrior(svgX,svgY,smooth=false){
  const wrapper=document.querySelector('.map-wrapper');
  const svg=document.getElementById('campusSvg');
  if(!wrapper||!svg) return;
  const svgW=svg.clientWidth||700;
  const svgH=svg.clientHeight||440;
  const scaleX=svgW/1000;
  const scaleY=svgH/440;
  const pixelX=svgX*scaleX;
  const pixelY=svgY*scaleY;
  const wrapperW=wrapper.clientWidth;
  const wrapperH=wrapper.clientHeight;
  const left=Math.max(0,pixelX-wrapperW/2);
  const top=Math.max(0,pixelY-wrapperH/2);
  if(smooth){
    wrapper.scrollTo({left,top,behavior:'smooth'});
  } else {
    wrapper.scrollLeft=left;
    wrapper.scrollTop=top;
  }
}

async function walkWarriorTo(target,fromPos){
  const svg=document.getElementById('campusSvg');
  const wg=svg&&svg.querySelector('#warriorGroup');
  if(!wg) return;
  const dist=Math.hypot(target.x-fromPos.x,target.y-fromPos.y);
  if(dist<6) return;
  const dur=Math.min(2400,Math.max(1200,dist*8));
  return new Promise(resolve=>{
    const start=performance.now();
    const sx=fromPos.x,sy=fromPos.y;
    function frame(now){
      const t=Math.min(1,(now-start)/dur);
      const x=sx+(target.x-sx)*t;
      const baseY=sy+(target.y-sy)*t;
      const bounce=Math.sin(t*Math.PI*8)*2.5;
      const y=baseY+bounce*(1-t);
      wg.setAttribute('transform',`translate(${x},${y})`);
      scrollMapToWarrior(x,y);
      if(t<1) requestAnimationFrame(frame);
      else{
        wg.setAttribute('transform',`translate(${target.x},${target.y})`);
        scrollMapToWarrior(target.x,target.y);
        resolve();
      }
    }
    requestAnimationFrame(frame);
  });
}

async function animateNewCompletion(user,newLevel,newEqKey){
  if(animationRunning) return;
  animationRunning=true;

  const order=getCompletionOrder(user.progress);
  const newLocId=levelToLocId(newLevel);
  const targetPos=WARRIOR_POS[newLocId];
  
  // Start: warrior at previous position
  const prevOrder=order.slice(0,order.indexOf(newLevel));
  const fromLocId=prevOrder.length>0?levelToLocId(prevOrder[prevOrder.length-1]):'start';
  const fromPos=WARRIOR_POS[fromLocId];
  
  // Draw initial state
  const tmpUser=JSON.parse(JSON.stringify(user));
  tmpUser.progress['level'+newLevel].completed=false;
  tmpUser.equipmentOrder=user.equipmentOrder.filter(e=>e!==newEqKey);
  document.getElementById('campusSvg').innerHTML=buildSvg(tmpUser,fromPos);
  renderEquipBar(tmpUser.equipmentOrder);
  const LOC_NAMES={start:'管理大樓（起點）',level1:'第一醫學大樓',level2:'管理大樓',level3:'圖書館',level4:'活動中心',boss:'活動中心'};
  setStory('勇者出發前往 '+(LOC_NAMES[newLocId]||'目的地')+'…');

  // 先將視窗捲動到勇者起始位置，等捲動完成後再開始移動
  scrollMapToWarrior(fromPos.x,fromPos.y,true);
  await delay(800);

  // Walk through waypoints
  let currentPos={...fromPos};
  const waypoints=[...getWaypoints(fromLocId,newLocId),targetPos];
  const walkPts=[{x:fromPos.x,y:fromPos.y}];

  for(const wp of waypoints){
    const dist=Math.hypot(wp.x-currentPos.x,wp.y-currentPos.y);
    if(dist>5){
      setStory('勇者移動中…');
      await walkWarriorTo(wp,currentPos);
    }
    currentPos={...wp};
    walkPts.push({x:currentPos.x,y:currentPos.y});
    const svgEl=document.getElementById('campusSvg');
    const wg=svgEl&&svgEl.querySelector('#warriorGroup');
    if(wg) wg.setAttribute('transform',`translate(${currentPos.x},${currentPos.y})`);
    updateWalkPolyline(walkPts);
    scrollMapToWarrior(currentPos.x,currentPos.y);
  }
  // 動畫結束後一次重建 SVG（含白色路徑）
  document.getElementById('campusSvg').innerHTML=buildSvg(tmpUser,currentPos,{walkPath:walkPts});

  setStory('✨ 到達目的地！寶箱發出金光…');
  await delay(700);

  // Reveal chest
  tmpUser.progress['level'+newLevel].completed=true;
  document.getElementById('campusSvg').innerHTML=buildSvg(tmpUser,currentPos,{walkPath:walkPts});
  scrollMapToWarrior(currentPos.x,currentPos.y);
  await delay(600);

  // Show reward popup
  await showRewardPopup(newEqKey);

  // Update equipment
  tmpUser.equipmentOrder=[...tmpUser.equipmentOrder,newEqKey];
  renderEquipBar(tmpUser.equipmentOrder);
  document.getElementById('campusSvg').innerHTML=buildSvg(tmpUser,currentPos,{walkPath:walkPts});
  scrollMapToWarrior(currentPos.x,currentPos.y);

  // Check for boss fight
  const allDone=[1,2,3,4].every(lv=>tmpUser.progress['level'+lv].completed);
  if(allDone&&!user.bossDefeated){
    setStory('⚔️ 四件裝備集齊！前往管理大樓 BOSS 區…');
    await delay(1000);
    await animateBossFight(user,currentPos,tmpUser);
  } else {
    const remaining=[1,2,3,4].filter(lv=>!tmpUser.progress['level'+lv].completed).length;
    setStory(remaining>0?`獲得 ${EQ_INFO[newEqKey].name}！還有 ${remaining} 關待攻略…`:`🏆 四關全通！前往管理大樓迎戰 BOSS！`);
  }
  animationRunning=false;
}

async function animateBossFight(user,currentPos,currentState){
  const bossPos=WARRIOR_POS.boss;
  const lastLocId=levelToLocId(getCompletionOrder(currentState.progress).slice(-1)[0]||'start');

  // 動畫前先渲染一次 SVG，確保 warriorGroup 在 DOM 中
  document.getElementById('campusSvg').innerHTML=buildSvg(currentState,currentPos,{walkPath:[]});
  updateWalkPolyline([]);
  setStory('⚔️ 勇者朝活動中心進發！');
  await delay(500);

  // Walk to boss
  const waypoints=[...getWaypoints(lastLocId,'boss'),bossPos];
  let currentPosWalk={...currentPos};
  const bossPts=[{x:currentPos.x,y:currentPos.y}];
  for(const wp of waypoints){
    const dist=Math.hypot(wp.x-currentPosWalk.x,wp.y-currentPosWalk.y);
    if(dist>5){
      await walkWarriorTo(wp,currentPosWalk);
    }
    currentPosWalk={...wp};
    bossPts.push({x:currentPosWalk.x,y:currentPosWalk.y});
    const svgEl=document.getElementById('campusSvg');
    const wg=svgEl&&svgEl.querySelector('#warriorGroup');
    if(wg) wg.setAttribute('transform',`translate(${currentPosWalk.x},${currentPosWalk.y})`);
    updateWalkPolyline(bossPts);
    scrollMapToWarrior(currentPosWalk.x,currentPosWalk.y);
  }
  // 動畫結束後一次重建 SVG（含白色路徑）
  document.getElementById('campusSvg').innerHTML=buildSvg(currentState,currentPosWalk,{walkPath:bossPts});

  setStory('💥 最終決戰開始！');
  await delay(400);

  // Boss fight animation
  document.getElementById('bossOverlay').classList.add('open');
  document.getElementById('warriorSprite').textContent='🧙';
  document.getElementById('bossSprite').textContent='😈';
  
  const msgs=['激烈戰鬥中…','勇者發動攻擊！⚔️','魔王反擊！😈','勇者使出全力！🔥','魔王力量在衰退…','勇者的光芒越來越強！✨'];
  for(let i=0;i<msgs.length;i++){
    document.getElementById('battleMsg').textContent=msgs[i];
    await delay(800);
  }
  
  // Boss defeated
  document.getElementById('bossSprite').textContent='💀';
  document.getElementById('battleMsg').textContent='魔王已被擊敗！🏆';
  await delay(800);
  document.getElementById('bossOverlay').classList.remove('open');

  // Save boss defeated
  user.bossDefeated=true;
  user.bossDefeatedAt=new Date().toISOString();
  saveUser(user);
  
  // Final map
  document.getElementById('campusSvg').innerHTML=buildSvg(user,bossPos,{bossDefeated:true,walkPath:bossPts});
  scrollMapToWarrior(bossPos.x,bossPos.y);
  setStory('🏆 VICTORY! 魔王已被擊敗！',true);
  
  launchConfetti();
  await delay(1200);
  launchConfetti();
  await delay(600);
  
  // Show victory
  document.getElementById('victoryOverlay').classList.add('open');
  launchConfetti();
}

function showRewardPopup(eqKey){
  return new Promise(resolve=>{
    const info=EQ_INFO[eqKey]||{icon:'?',name:'?',desc:'?'};
    document.getElementById('rbName').textContent=info.name;
    document.getElementById('rbDesc').textContent=info.desc;
    document.getElementById('rewardOverlay').classList.add('open');
    launchConfetti();
    window._rewardResolve=resolve;
  });
}

function closeReward(){
  document.getElementById('rewardOverlay').classList.remove('open');
  if(window._rewardResolve){window._rewardResolve();window._rewardResolve=null}
}

function closeVictory(){
  document.getElementById('victoryOverlay').classList.remove('open');
}

function goNextQr(){
  window.location.href='index.html';
}

// ─── Equipment bar ───
function renderEquipBar(equip){
  const all=['sword','shield','grail','armor'];
  document.getElementById('equipBar').innerHTML=all.map(e=>{
    const has=equip.includes(e);
    const info=EQ_INFO[e];
    return`<div class="eq-slot ${has?'owned':''}">
      <span class="eq-icon">${info.icon}</span>
      <span class="eq-name">${has?info.name:'？？？'}</span>
    </div>`;
  }).join('');
}

// ─── Confetti ───
function launchConfetti(){
  const colors=['#ff7a00','#ffd700','#b84eff','#22ff77','#ff2255','#ff9c2b'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div'); c.className='cpiece';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(1.5+Math.random()*2)+'s';
    c.style.animationDelay=(Math.random()*0.4)+'s';
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

// ─── Init ───
(async function(){
  const sid=localStorage.getItem(SESSION_KEY)||'';
  const urlParams=new URLSearchParams(window.location.search);
  const reward=urlParams.get('reward');
  const level=parseInt(urlParams.get('level'));

  // Always sync from Firestore first (covers both static view and reward/animation flow)
  // This prevents duplicate boss fights when bossDefeated was already saved on another device
  if(sid){
    const cloudUser=await loadUserFromCloud(sid);
    if(cloudUser){
      const db=getDB();
      const local=db.users[sid];
      const cloudEqLen=(cloudUser.equipmentOrder||[]).length;
      const localEqLen=(local?.equipmentOrder||[]).length;
      if(!local||cloudEqLen>localEqLen||(cloudUser.bossDefeated&&!local?.bossDefeated)){
        db.users[sid]=cloudUser;
        saveDB(db);
      }
    }
  }

  const user=getCurrentUser();
  if(!user){
    setStory('請先在首頁登入！');
    document.getElementById('campusSvg').innerHTML=buildSvg(
      {equipmentOrder:[],progress:{level1:{completed:false},level2:{completed:false},level3:{completed:false},level4:{completed:false}},bossDefeated:false},
      WARRIOR_POS.start
    );
    renderEquipBar([]);
    return;
  }

  document.getElementById('userTag').textContent=user.name;

  if(reward&&level){
    // Validate URL params: level must actually be completed and reward must be in equipmentOrder
    const validLevels=[1,2,3,4];
    const levelCompleted=validLevels.includes(level)&&user.progress['level'+level]?.completed===true;
    const rewardOwned=(user.equipmentOrder||[]).includes(reward);
    if(!levelCompleted||!rewardOwned){
      window.location.href='index.html';
    } else {
    // Just completed a level — animate, then clean URL to prevent re-trigger on reload
    // user.bossDefeated already reflects latest Firestore state after sync above
    setTimeout(async()=>{
      await animateNewCompletion(user,level,reward);
      history.replaceState(null,'',location.pathname);
    },400);
    }
  } else {
    // Static view
    const wpos=getCurrentWarriorPos(user);
    document.getElementById('campusSvg').innerHTML=buildSvg(user,wpos);
    renderEquipBar(user.equipmentOrder||[]);
    requestAnimationFrame(()=>scrollMapToWarrior(wpos.x,wpos.y));
    const order=getCompletionOrder(user.progress);
    if(user.bossDefeated){
      setStory('🏆 VICTORY! 魔王已被擊敗！前往管院 8 樓領取禮物！',true);
    } else if(order.length===0){
      setStory('冒險尚未開始。掃描展板 QR Code，挑戰第一關！');
    } else if([1,2,3,4].every(lv=>user.progress['level'+lv].completed)){
      setStory('⚔️ 四件裝備集齊！回首頁查看 BOSS 狀態！');
    } else {
      setStory(`已通過 ${order.length} / 4 關。繼續探索校園！`);
    }
  }
})();
</script>
