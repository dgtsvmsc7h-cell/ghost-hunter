<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ghost Hunter — 打卡牆投票</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Creepster&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070012;--card:rgba(15,2,30,0.9);--border:rgba(255,120,0,0.35);
  --orange:#ff7a00;--orange2:#ff9c2b;--purple:#8a2be2;--purple2:#b84eff;
  --green:#22ff77;--red:#ff2255;--gold:#ffd700;--cream:#fff0d8;
  --text:#f0e0ff;--subtext:rgba(240,224,255,0.6);--radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;color:var(--text);font-family:'Nunito',sans-serif;overflow-x:hidden}

body{background:#000;}

/* Stars */
.star{position:fixed;border-radius:50%;background:white;pointer-events:none;z-index:0;animation:twinkle 3s infinite ease-in-out}
@keyframes twinkle{0%,100%{opacity:0.1;transform:scale(1)}50%{opacity:0.8;transform:scale(1.3)}}

/* Floating spookies */
.spook{
  position:fixed;pointer-events:none;opacity:0;z-index:0;
  animation:spookRise 18s linear infinite;
}
@keyframes spookRise{
  0%{transform:translateY(110vh) rotate(-8deg);opacity:0}
  5%{opacity:0.5}90%{opacity:0.3}
  100%{transform:translateY(-150px) rotate(12deg);opacity:0}
}

/* ── Background image ── */
.bg-img{position:fixed;inset:0;z-index:0;}
.bg-img img{width:100%;height:100%;object-fit:cover;object-position:center;filter:brightness(0.5);}

/* ── Layout ── */
.page{max-width:480px;margin:0 auto;padding:16px 16px 80px;position:relative;z-index:1;min-height:100vh}

/* Header */
.vote-header{text-align:center;padding:24px 8px 20px}
.vote-header h1{
  font-family:'Bangers',cursive;font-size:clamp(36px,10vw,52px);
  line-height:1;letter-spacing:2px;margin-bottom:6px;
  color:#ffffff;
  text-shadow:0 0 30px rgba(255,255,255,0.4),4px 4px 0 rgba(0,0,0,0.5);
}
.vote-header .sub{font-family:'Creepster',cursive;font-size:24px;color:#ffffff;letter-spacing:2px;margin-bottom:10px}
.vote-header .desc{font-size:14px;color:var(--subtext);line-height:1.6;max-width:320px;margin:0 auto}

/* Card */
.section-card{
  background:rgba(10,2,20,0.85);border:1px solid rgba(255,215,0,0.3);
  border-radius:var(--radius);padding:22px 18px;margin-bottom:16px;
  backdrop-filter:blur(8px);
}
.section-title{
  font-family:'Bangers',cursive;font-size:24px;letter-spacing:2px;
  color:var(--gold);margin-bottom:14px;text-align:center;
}

/* Vote options */
.vote-options{display:flex;flex-direction:column;gap:10px}
.vote-opt{
  display:flex;align-items:center;gap:14px;
  background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.1);
  border-radius:12px;padding:16px 14px;cursor:pointer;transition:all 0.2s;
  text-align:left;width:100%;font-family:'Nunito',sans-serif;
}
.vote-opt:active{transform:scale(0.98)}
.vote-opt[disabled]:active,
.vote-opt.locked:active{transform:none;pointer-events:none}
.vote-opt.selected{border-color:var(--gold);background:rgba(255,215,0,0.1);box-shadow:0 0 20px rgba(255,215,0,0.2)}
.vote-opt .vo-icon{font-size:30px;flex-shrink:0}
.vote-opt .vo-text{flex:1}
.vote-opt .vo-name{font-size:16px;font-weight:700;color:var(--cream);line-height:1.2}
.vote-opt .vo-loc{font-size:12px;color:var(--subtext);margin-top:3px}
.vote-opt .vo-check{font-size:20px;flex-shrink:0;opacity:0;transition:opacity 0.2s}
.vote-opt.selected .vo-check{opacity:1}

/* Submit btn */
.submit-btn{
  width:100%;background:linear-gradient(135deg,var(--gold),#ff8c00);
  border:none;border-radius:12px;padding:17px;
  font-family:'Bangers',cursive;font-size:24px;letter-spacing:2px;
  color:#1a0000;cursor:pointer;transition:all 0.2s;
  box-shadow:0 4px 24px rgba(255,215,0,0.35);
  display:block;text-align:center;text-decoration:none;
  margin-top:6px;
}
.submit-btn:active{transform:scale(0.97)}
.submit-btn:disabled{opacity:0.4;cursor:not-allowed}

/* Login form */
.login-box{
  background:rgba(10,2,20,0.85);border:1px solid rgba(255,215,0,0.3);
  border-radius:var(--radius);padding:24px 18px;
  backdrop-filter:blur(8px);
}
.login-box input{
  width:100%;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.12);
  border-radius:10px;padding:14px;font-size:17px;color:var(--cream);
  font-family:'Nunito',sans-serif;outline:none;transition:border-color 0.2s;
  -webkit-appearance:none;margin-bottom:10px;box-sizing:border-box;
}
.login-box input:focus{border-color:var(--gold)}
.login-box input::placeholder{color:rgba(255,255,255,0.25)}

/* Already voted */
.voted-card{
  background:rgba(34,255,119,0.08);border:1px solid rgba(34,255,119,0.4);
  border-radius:var(--radius);padding:28px 20px;text-align:center;
}

/* Victory */
.victory-screen{display:none;text-align:center;padding:20px 0}
.victory-screen.show{display:block}
.victory-anim{font-size:80px;display:block;margin-bottom:14px;animation:victoryBounce 1.5s ease-in-out infinite}
@keyframes victoryBounce{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-10px) rotate(3deg)}}
.victory-title{font-family:'Bangers',cursive;font-size:38px;letter-spacing:2px;color:var(--gold);margin-bottom:8px;text-shadow:0 0 20px rgba(255,215,0,0.5)}
.victory-eq{
  display:inline-flex;flex-direction:column;align-items:center;gap:6px;
  background:rgba(255,215,0,0.1);border:2px solid var(--gold);
  border-radius:12px;padding:16px 24px;margin:16px 0;
  box-shadow:0 0 30px rgba(255,215,0,0.3);
}
.victory-eq .ve-icon{font-size:54px}
.victory-eq .ve-name{font-family:'Bangers',cursive;font-size:24px;color:var(--gold);letter-spacing:2px}
.victory-msg{font-size:15px;color:var(--text);line-height:1.6;margin-bottom:18px}

.action-btn{
  width:100%;background:linear-gradient(135deg,var(--orange),#ff3a00);
  border:none;border-radius:12px;padding:17px;
  font-family:'Bangers',cursive;font-size:22px;letter-spacing:2px;
  color:white;cursor:pointer;margin-bottom:10px;display:block;text-align:center;text-decoration:none;
  box-shadow:0 4px 20px rgba(255,80,0,0.3);
}
.action-btn:active{transform:scale(0.97)}
.action-btn.sec{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);box-shadow:none;color:var(--text)}

/* Confetti */
.confetti-piece{
  position:fixed;width:10px;height:16px;z-index:500;pointer-events:none;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<div class="bg-img"><img src="打卡投票牆.jpg" alt=""></div>

<div class="page" id="mainPage">
  <div class="vote-header">
    <h1>打卡牆<br>投票站</h1>
    <div class="sub">Ghost Mode ON 🎃</div>
    <p class="desc">歡迎來到活動打卡牆！投票選出你最愛的展區，獲得最後一件裝備！</p>
  </div>
  <div id="pageContent"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const DB_KEY='ghost_hunter_db_v1';
const SESSION_KEY='ghost_hunter_session';

// ── Firebase 設定（請替換為你的專案資訊）──
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDAMI3neAeRNrfVdG1NenlI6osL1qN6vyM",
  authDomain: "ghost-hunter-c8ec6.firebaseapp.com",
  projectId: "ghost-hunter-c8ec6",
  storageBucket: "ghost-hunter-c8ec6.firebasestorage.app",
  messagingSenderId: "822859188160",
  appId: "1:822859188160:web:80eff0b443c7939224aa25"
};
let fbStore = null;
(function initFirebase(){
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    fbStore = firebase.firestore();
  }catch(e){ console.warn('Firebase 未初始化，使用本機儲存', e); }
})();
async function syncUserToCloud(user){
  if(!fbStore) return;
  try{ await fbStore.collection('users').doc(user.sid).set(user); }
  catch(e){ console.warn('雲端寫入失敗', e); }
}
async function loadUserFromCloud(sid){
  if(!fbStore) return null;
  try{
    const snap = await fbStore.collection('users').doc(sid).get();
    if(snap.exists) return snap.data();
  }catch(e){ console.warn('雲端讀取失敗', e); }
  return null;
}
async function incrementVoteInCloud(voteKey){
  if(!fbStore) return;
  try{
    await fbStore.collection('voteStats').doc('stats').set(
      {[voteKey]: firebase.firestore.FieldValue.increment(1)},
      {merge: true}
    );
  }catch(e){ console.warn('投票雲端同步失敗', e); }
}

function getDB(){
  try{return JSON.parse(localStorage.getItem(DB_KEY)||'{"users":{},"voteStats":{"zone1":0,"zone2":0,"zone3":0,"zone4":0}}')}
  catch{return{users:{},voteStats:{zone1:0,zone2:0,zone3:0,zone4:0}}}
}
function saveDB(db){localStorage.setItem(DB_KEY,JSON.stringify(db))}
function getCurrentUser(){
  const sid=localStorage.getItem(SESSION_KEY)||''; if(!sid) return null;
  return getDB().users[sid]||null;
}
function saveUser(user){const db=getDB();db.users[user.sid]=user;saveDB(db);syncUserToCloud(user);}

// Create stars
for(let i=0;i<30;i++){
  const s=document.createElement('div'); s.className='star';
  const sz=Math.random()*2+1;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*4}s`;
  document.body.appendChild(s);
}
// Floating emojis
['🎃','👻','🦇','💀','🕸️'].forEach((e,i)=>{
  const d=document.createElement('div'); d.className='spook'; d.textContent=e;
  d.style.cssText=`left:${10+i*18}%;font-size:${28+Math.random()*16}px;animation-delay:${i*4}s;animation-duration:${18+i*4}s`;
  document.body.appendChild(d);
});

const VOTE_OPTIONS=[
  {key:'zone1',icon:'<img src="關卡三元素.png" style="width:28px;height:28px;object-fit:contain">',name:'Origin.exe 展區',loc:'第一醫學大樓'},
  {key:'zone2',icon:'👻',name:'Ghost Database 展區',loc:'管理大樓'},
  {key:'zone3',icon:'🎃',name:'Pumpkin Code 展區',loc:'圖書館'},
  {key:'zone4',icon:'📸',name:'Ghost Mode ON 展區',loc:'活動中心三樓'},
];

let selectedVote=null;

const LEVEL_INFO={
  1:{icon:'<img src="關卡三元素.png" style="width:28px;height:28px;object-fit:contain">',name:'萬聖節的起源',loc:'第一醫學大樓'},
  2:{icon:'👻',name:'世界鬼怪文化',loc:'管理大樓'},
  3:{icon:'🎃',name:'南瓜燈的秘密',loc:'圖書館'},
};

function init(){
  const user=getCurrentUser();
  if(!user){renderLoginForm(); return}
  if(user.progress?.level4?.completed){renderAlreadyVoted(user); return}
  const incomplete=[1,2,3].filter(lv=>!user.progress?.['level'+lv]?.completed);
  if(incomplete.length>0){renderLockedForm(user,incomplete); return}
  renderVoteForm(user);
}

function renderLockedForm(user,incomplete){
  const rows=incomplete.map(lv=>{
    const info=LEVEL_INFO[lv];
    return`<div style="display:flex;align-items:center;gap:12px;
      background:rgba(255,120,0,0.07);border:1px solid rgba(255,120,0,0.3);
      border-radius:10px;padding:11px 14px;margin-bottom:8px">
      <span style="font-size:22px">${info.icon}</span>
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--cream)">STAGE 0${lv}｜${info.name}</div>
        <div style="font-size:11px;color:var(--subtext);margin-top:2px">📍 ${info.loc}</div>
      </div>
      <span style="margin-left:auto;font-size:11px;font-weight:700;
        color:var(--orange);letter-spacing:1px">未完成</span>
    </div>`;
  }).join('');

  const completed=[1,2,3].filter(lv=>!incomplete.includes(lv));
  const completedSection=completed.length>0?`
    <div style="font-size:11px;color:var(--subtext);letter-spacing:2px;text-align:center;margin-bottom:8px">已完成關卡</div>
    ${completed.map(lv=>{
      const info=LEVEL_INFO[lv];
      return`<div style="display:flex;align-items:center;gap:12px;
        background:rgba(34,255,119,0.05);border:1px solid rgba(34,255,119,0.3);
        border-radius:10px;padding:11px 14px;margin-bottom:8px">
        <span style="font-size:22px">${info.icon}</span>
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--cream)">STAGE 0${lv}｜${info.name}</div>
          <div style="font-size:11px;color:var(--subtext);margin-top:2px">📍 ${info.loc}</div>
        </div>
        <span style="margin-left:auto;font-size:11px;font-weight:700;
          color:var(--green);letter-spacing:1px">已完成</span>
      </div>`;
    }).join('')}`:'';

  document.getElementById('pageContent').innerHTML=`
    <div class="section-card" style="border-color:rgba(255,80,0,0.5)">
      <div style="font-size:11px;letter-spacing:3px;color:var(--subtext);margin-bottom:14px;text-align:center">
        勇者 ${user.name}（${user.sid}）
      </div>
      <div style="text-align:center;font-size:48px;margin-bottom:10px">🔒</div>
      <div style="font-family:'Bangers',cursive;font-size:26px;letter-spacing:2px;
        color:var(--orange2);text-align:center;margin-bottom:6px">第四關尚未解鎖</div>
      <div style="font-size:14px;color:var(--text);text-align:center;line-height:1.7;margin-bottom:18px">
        請先至其他關卡取得裝備，<br>再來挑戰第四關!!
      </div>
      <div style="margin-bottom:18px">${rows}</div>
      ${completedSection}
    </div>
    <a href="index.html" style="display:block;text-align:center;margin-top:14px;
      font-family:'Bangers',cursive;font-size:20px;letter-spacing:2px;
      color:var(--orange2);text-decoration:none">← 回首頁繼續闖關</a>`;
}

function renderLoginForm(){
  document.getElementById('pageContent').innerHTML=`
    <div class="login-box">
      <div style="text-align:center;font-size:50px;margin-bottom:14px">🔐</div>
      <div style="text-align:center;font-family:'Bangers',cursive;font-size:26px;color:var(--gold);letter-spacing:2px;margin-bottom:8px">請先登入</div>
      <div style="text-align:center;font-size:13px;color:var(--subtext);margin-bottom:18px;line-height:1.6">輸入學號與姓名開始投票</div>
      <input type="text" id="pSid" placeholder="學號" autocomplete="off" autocapitalize="off">
      <input type="text" id="pName" placeholder="姓名">
      <button onclick="quickLogin()" class="submit-btn">🗳️ 登入並投票</button>
    </div>`;
}
async function quickLogin(){
  const sid=document.getElementById('pSid').value.trim();
  const name=document.getElementById('pName').value.trim();
  if(!sid||!name){alert('請填入學號與姓名');return}
  const cloudUser = await loadUserFromCloud(sid);
  const db=getDB();
  if(!db.users[sid]){
    const newUser=cloudUser||{
      sid,name,createdAt:new Date().toISOString(),
      progress:{
        level1:{completed:false,score:0,completedAt:null,equipment:null},
        level2:{completed:false,score:0,completedAt:null,equipment:null},
        level3:{completed:false,score:0,completedAt:null,equipment:null},
        level4:{completed:false,vote:null,completedAt:null,equipment:null},
      },
      equipmentOrder:[],bossDefeated:false,bossDefeatedAt:null
    };
    saveUser(newUser);
  } else if(cloudUser){
    const local=db.users[sid];
    const cloudEqLen=(cloudUser.equipmentOrder||[]).length;
    const localEqLen=(local?.equipmentOrder||[]).length;
    const cloudAhead=cloudEqLen>localEqLen||(cloudUser.bossDefeated&&!local?.bossDefeated);
    if(cloudAhead){ db.users[sid]=cloudUser; saveDB(db); }
  }
  localStorage.setItem(SESSION_KEY,sid);
  init();
}

function renderVoteForm(user){
  document.getElementById('pageContent').innerHTML=`
    <div class="section-card">
      <div style="font-size:11px;letter-spacing:3px;color:var(--subtext);margin-bottom:6px;text-align:center">勇者 ${user.name}（${user.sid}）</div>
      <div class="section-title">🗳️ 你最喜歡哪個展區？</div>
      <div class="vote-options" id="voteOpts">
        ${VOTE_OPTIONS.map((o,i)=>`
          <button class="vote-opt" onclick="selectVote('${o.key}',this)" data-key="${o.key}">
            <span class="vo-icon">${o.icon}</span>
            <div class="vo-text">
              <div class="vo-name">${o.name}</div>
              <div class="vo-loc">📍 ${o.loc}</div>
            </div>
            <span class="vo-check">✓</span>
          </button>`).join('')}
      </div>
      <button class="submit-btn" id="submitBtn" onclick="submitVote()" disabled style="margin-top:14px">選擇後投票</button>
      <div style="font-size:12px;color:var(--subtext);text-align:center;margin-top:10px">每位勇者只能投票一次，投票後不可修改</div>
    </div>`;
}

function selectVote(key,btn){
  selectedVote=key;
  document.querySelectorAll('.vote-opt').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  const sb=document.getElementById('submitBtn');
  sb.disabled=false; sb.textContent='🗳️ 確認投票';
}

function submitVote(){
  if(!selectedVote) return;
  if(!confirm('確定投給這個展區嗎？投票後不可修改。')) return;
  const user=getCurrentUser(); if(!user) return;
  
  // Assign armor (calculated first to guard before any writes)
  const owned=user.equipmentOrder||[];
  const available=['sword','shield','grail','armor'].filter(e=>!owned.includes(e));
  const newEq=available.includes('armor')?'armor':(available.length>0?available[Math.floor(Math.random()*available.length)]:null);
  if(!newEq) return;

  // Save vote
  const db=getDB();
  if(!db.voteStats) db.voteStats={zone1:0,zone2:0,zone3:0,zone4:0};
  db.voteStats[selectedVote]=(db.voteStats[selectedVote]||0)+1;
  saveDB(db);
  incrementVoteInCloud(selectedVote);
  const now=new Date().toISOString();
  user.progress.level4={completed:true,vote:selectedVote,completedAt:now,equipment:newEq};
  user.equipmentOrder=[...owned,newEq];
  saveUser(user);
  
  // Confetti
  launchConfetti();
  
  // Redirect to warrior with reward
  const redirectUrl=`warrior.html?reward=${newEq}&level=4&score=voted`;
  setTimeout(()=>{ window.location.href=redirectUrl; }, 1800);

  showVictory(user,newEq,redirectUrl);
}

function showVictory(user,eq,redirectUrl){
  const eqInfo={sword:{icon:'⚔️',name:'聖劍'},shield:{icon:'🛡️',name:'聖盾'},grail:{icon:'🏆',name:'聖杯'},armor:{icon:'🛡️',name:'盔甲'}};
  const info=eqInfo[eq]||{icon:'🛡️',name:'盔甲'};
  document.getElementById('pageContent').innerHTML=`
    <div class="victory-screen show">
      <span class="victory-anim">🎊</span>
      <div class="victory-title">投票成功！</div>
      <div class="victory-msg">感謝你的投票！你獲得了第四件裝備：</div>
      <div class="victory-eq">
        <span class="ve-icon">${info.icon}</span>
        <span class="ve-name">${info.name}</span>
      </div>
      <div class="victory-msg" style="margin-bottom:18px">即將前往勇者地圖，查看你的完整通關紀錄…</div>
      <a href="${redirectUrl}" class="action-btn" style="display:block;text-align:center;text-decoration:none">⚔️ 立即前往勇者地圖</a>
      <a href="index.html" class="action-btn sec" style="display:block;text-align:center;text-decoration:none;margin-top:10px">🏠 回首頁</a>
    </div>`;
}

function renderAlreadyVoted(user){
  const p=user.progress?.level4;
  const voted=VOTE_OPTIONS.find(o=>o.key===p.vote)||{icon:'🗳️',name:'已投票'};
  document.getElementById('pageContent').innerHTML=`
    <div class="voted-card">
      <div style="font-size:60px;text-align:center;display:block;margin-bottom:14px">✅</div>
      <div style="font-family:'Bangers',cursive;font-size:28px;color:var(--green);text-align:center;letter-spacing:1px;margin-bottom:8px">已完成投票</div>
      <p style="font-size:14px;color:var(--subtext);text-align:center;line-height:1.6;margin-bottom:18px">
        你投給了：${voted.icon} ${voted.name}<br>
        <span style="font-size:12px;opacity:0.7">進度已儲存，可隨時回首頁查看通關紀錄。</span>
      </p>
      <a href="warrior.html" class="action-btn">⚔️ 查看勇者地圖</a>
      <a href="index.html" class="action-btn sec">🏠 回首頁</a>
    </div>`;
}

function launchConfetti(){
  const colors=['#ff7a00','#ffd700','#b84eff','#22ff77','#ff2255','#ff9c2b'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div'); c.className='confetti-piece';
    c.style.left=Math.random()*100+'vw';
    c.style.top='-20px';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    c.style.animationDuration=(1.5+Math.random()*2)+'s';
    c.style.animationDelay=(Math.random()*0.5)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

init();
</script>
